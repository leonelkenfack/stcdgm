# Hydra Training Configuration for ST-CDGM

defaults:
  - _self_

data:
  dataset_format: "zarr"
  lr_path: "data/raw/train/predictor_ACCESS-CM2_hist.nc"
  hr_path: "data/raw/train/pr_ACCESS-CM2_hist.nc"
  static_path: "data/raw/static_predictors/ERA5_eval_ccam_12km.198110_NZ_Invariant.nc"
  zarr_dir: "data/raw/train/zarr"
  shard_dir: "data/raw/train/shards"
  seq_len: 16
  stride: 1
  baseline_strategy: "lr_interp"
  baseline_factor: 4
  normalize: true
  target_transform: "log1p"
  nan_fill_strategy: "mean"
  precipitation_delta: 0.01
  lr_variables: ['u_850', 'u_500', 'u_250', 'v_850', 'v_500', 'v_250', 'w_850', 'w_500', 'w_250', 'q_850', 'q_500', 'q_250', 't_850', 't_500', 't_250']
  hr_variables: ["pr"]
  static_variables: ["orog", "he", "vegt"]

graph:
  lr_shape: [23, 26]
  hr_shape: [172, 179]
  static_variables: ["orog", "he", "vegt"]
  include_mid_layer: true

encoder:
  hidden_dim: 256
  conditioning_dim: 256
  metapaths:
    - name: "GP850_spat_adj"
      src: "GP850"
      relation: "spat_adj"
      target: "GP850"
      pool: "max"
    - name: "GP850_to_GP500"
      src: "GP850"
      relation: "vert_adj"
      target: "GP500"
      pool: "max"
    - name: "GP500_spat_adj"
      src: "GP500"
      relation: "spat_adj"
      target: "GP500"
      pool: "max"
    - name: "GP500_to_GP250"
      src: "GP500"
      relation: "vert_adj"
      target: "GP250"
      pool: "max"
    - name: "GP250_spat_adj"
      src: "GP250"
      relation: "spat_adj"
      target: "GP250"
      pool: "max"

rcn:
  hidden_dim: 256
  driver_dim: 15
  reconstruction_dim: 15
  dropout: 0.1
  detach_interval: 16

diffusion:
  in_channels: 1
  conditioning_dim: 256
  height: 172
  width: 179
  steps: 100
  scheduler_type: "dpm_solver++"
  use_gradient_checkpointing: true
  cfg_scale: 2.0
  conditioning_dropout_prob: 0.1
  conv_padding_mode: "zeros"
  anti_checkerboard: true
  unet_kwargs:
    layers_per_block: 2
    block_out_channels: [64, 128, 256]
    down_block_types:
      - "DownBlock2D"
      - "CrossAttnDownBlock2D"
      - "CrossAttnDownBlock2D"
    up_block_types:
      - "CrossAttnUpBlock2D"
      - "CrossAttnUpBlock2D"
      - "UpBlock2D"
    mid_block_type: "UNetMidBlock2D"
    norm_num_groups: 32
    class_embed_type: "projection"
    projection_class_embeddings_input_dim: 1280
    resnet_time_scale_shift: "scale_shift"
    attention_head_dim: 32
    only_cross_attention: [false, true, true]

loss:
  lambda_gen: 0.7
  beta_rec: 0.5
  gamma_dag: 0.01
  lambda_phy: 0.1
  lambda_spectral: 0.0
  use_spectral_loss: false
  log_spectral_metric_each_epoch: true
  dag_method: "dagma"
  dagma_s: 1.0
  use_focal_loss: false
  focal_alpha: 1.0
  focal_gamma: 2.0
  extreme_weight_factor: 2.0
  extreme_percentiles: [95.0, 99.0]
  dag_l1_regularization: true
  dag_l1_weight: 0.01
  reconstruction_loss_type: "mse+cosine"
  lambda_dag_prior: 0.01
  dag_prior:
    - [0.0, 0.3, 0.0, 0.0, 0.0]
    - [0.3, 0.0, 0.3, 0.0, 0.0]
    - [0.0, 0.3, 0.0, 0.3, 0.0]
    - [0.0, 0.0, 0.3, 0.0, 0.3]
    - [0.0, 0.0, 0.0, 0.3, 0.0]

training:
  device: "cuda"
  epochs: 30
  batch_size: 16
  num_workers: 0
  lr: 0.0002
  gradient_clipping: 1.0
  log_every: 10
  use_amp: true
  multi_gpu:
    enabled: false
    strategy: "ddp"
    gpus: [0]
    find_unused_parameters: true
  early_stopping:
    enabled: true
    patience: 20
    min_delta: 0.0001
    restore_best: true
  lr_scheduler:
    enabled: true
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7
  physical_loss:
    use_predicted_output: false
    physical_sample_interval: 10
    physical_num_steps: 15
  compile:
    enabled: true
    rcn_mode: "reduce-overhead"
    diffusion_mode: "max-autotune"
    encoder_mode: "reduce-overhead"

checkpoint:
  enabled: true
  save_dir: "models"
  save_every: 5
  save_best: true
  max_checkpoints: 5

evaluation:
  enabled: true
  eval_every: 5
  num_samples: 10
  crps_max_ensemble_members: 32
  compute_f1_extremes: true
  f1_percentiles: [95.0, 99.0]
  save_visualizations: true
  output_dir: "results"
