# ============================================================================
# ST-CDGM - Configuration d'Entraînement Optimisée (v2.0)
# Basé sur l'analyse multi-rôles (ML Engineer, Climatologue, Mathématicien)
# ============================================================================

defaults:
  - _self_

# ============================================================================
# CONFIGURATION DES DONNÉES
# ============================================================================
data:
  dataset_format: "netcdf"  # "netcdf", "zarr", ou "shard"
  lr_path: "data/raw/train/predictor_ACCESS-CM2_hist.nc"
  hr_path: "data/raw/train/pr_ACCESS-CM2_hist.nc"
  static_path: "data/raw/static_predictors/ERA5_eval_ccam_12km.198110_NZ_Invariant.nc"
  zarr_dir: "data/raw/train/zarr"
  shard_dir: "data/raw/train/shards"
  
  # Séquences temporelles
  seq_len: 16              # Contexte temporel suffisant pour météo
  stride: 2               # Équilibre entre données et mémoire
  
  # Baseline
  baseline_strategy: "hr_smoothing"
  baseline_factor: 4
  
  # Préprocessing
  normalize: true
  target_transform: "log1p"
  nan_fill_strategy: "mean"
  precipitation_delta: 0.01
  
  # Variables
  lr_variables: ['u_850', 'u_500', 'u_250', 'v_850', 'v_500', 'v_250', 
                 'w_850', 'w_500', 'w_250', 'q_850', 'q_500', 'q_250', 
                 't_850', 't_500', 't_250']
  hr_variables: ["pr"]
  static_variables: ["orog", "he", "vegt"]

# ============================================================================
# CONFIGURATION DU GRAPHE
# ============================================================================
graph:
  lr_shape: [23, 26]
  hr_shape: [172, 179]
  static_variables: []
  include_mid_layer: true  # GP500/GP250 activés

# ============================================================================
# CONFIGURATION DE L'ENCODEUR
# ============================================================================
encoder:
  hidden_dim: 128
  conditioning_dim: 128
  metapaths:
    - name: "GP850_spat_adj"
      src: "GP850"
      relation: "spat_adj"
      target: "GP850"
      pool: "mean"
    - name: "GP850_to_GP500"
      src: "GP850"
      relation: "vert_adj"
      target: "GP500"
      pool: "mean"
    - name: "GP500_spat_adj"
      src: "GP500"
      relation: "spat_adj"
      target: "GP500"
      pool: "mean"
    - name: "GP500_to_GP250"
      src: "GP500"
      relation: "vert_adj"
      target: "GP250"
      pool: "mean"
    - name: "GP250_spat_adj"
      src: "GP250"
      relation: "spat_adj"
      target: "GP250"
      pool: "mean"

# ============================================================================
# CONFIGURATION RCN (Réseau Causal Récurrent)
# ============================================================================
rcn:
  hidden_dim: 128
  driver_dim: 15      # Overridden at runtime by data sample shape
  reconstruction_dim: 15
  dropout: 0.2        # Pas de dropout (sous-apprentissage actuel)
  detach_interval: 16  # Truncated BPTT: gradient flows back 4 steps

# ============================================================================
# CONFIGURATION DIFFUSION
# ============================================================================
diffusion:
  in_channels: 1
  conditioning_dim: 128
  height: 172
  width: 179
  
  # Steps de diffusion - CRITIQUE pour la qualité
  steps: 12                # ↑ de 20 à 100 (qualité génération)
  scheduler_type: "dpm_solver++"        # Stable pour entraînement
  eval_num_steps: 12            # 15 steps suffisent avec DPM-Solver++
  
  use_gradient_checkpointing: false
  cfg_scale: 0.2
  conditioning_dropout_prob: 0.1
  conv_padding_mode: "zeros"
  anti_checkerboard: true
  
  unet_kwargs:
    layers_per_block: 1
    block_out_channels: [32, 64]
    down_block_types:
      - "DownBlock2D"
      - "CrossAttnDownBlock2D"
    up_block_types:
      - "CrossAttnUpBlock2D"
      - "UpBlock2D"
    mid_block_type: "UNetMidBlock2D"
    norm_num_groups: 8
    class_embed_type: "projection"
    
    # ⚠️ CRITIQUE: Doit correspondre à hidden_dim × nb_metapaths
    projection_class_embeddings_input_dim: 640  # 128 × 5 = 640
    
    resnet_time_scale_shift: "scale_shift"
    attention_head_dim: 32
    only_cross_attention: [false, true]

# ============================================================================
# CONFIGURATION DES PERTES (LOSS)
# ============================================================================
loss:
  # Pondérations des pertes - REBALANCÉ pour convergence optimale
  lambda_gen: 1.0       # ↓ de 1.0 (trop dominant avant)
  beta_rec: 0.05         # ↑ de 0.05 (CRITIQUE pour reconstruction)
  gamma_dag: 0.15       # Warm-up phase 1 (→ 0.1 après epoch 50)
  lambda_phy: 0.0       # Désactivé (instable sans use_predicted_output=true)
  lambda_spectral: 0.0
  
  # Métriques spectrales
  use_spectral_loss: false
  log_spectral_metric_each_epoch: true
  
  # Contrainte DAG
  dag_method: "dagma"
  dagma_s: 1.0
  dag_l1_regularization: true
  dag_l1_weight: 0.01
  lambda_dag_prior: 0.005
  dag_prior:
    - [0.0, 0.2, 0.0, 0.0, 0.0]
    - [0.2, 0.0, 0.2, 0.0, 0.0]
    - [0.0, 0.2, 0.0, 0.2, 0.0]
    - [0.0, 0.0, 0.2, 0.0, 0.2]
    - [0.0, 0.0, 0.0, 0.2, 0.0]
  
  # Focal Loss - CRITIQUE pour événements extrêmes
  use_focal_loss: true
  focal_alpha: 1.0
  focal_gamma: 1.5        # ↑ de 2.0 (plus focus sur pixels difficiles)
  
  # Pondération événements extrêmes
  extreme_weight_factor: 2.0
  extreme_percentiles: [95.0, 99.0]
  
  # Type de perte reconstruction
  reconstruction_loss_type: "huber+cosine"  # Combinaison MSE + similarité cosinus

# ============================================================================
# CONFIGURATION ENTRAÎNEMENT
# ============================================================================
training:
  device: "cpu"  # "cuda" si GPU disponible
  epochs: 30    # ↑ de 10 à 100 (convergence complète)
  batch_size: 48
  num_workers: 0  # 0 pour CyVerse/Docker (évite /dev/shm limité)
  lr: 0.0003
  gradient_clipping: 0.5
  log_every: 20
  use_amp: false
  
  # Multi-GPU (DDP)
  multi_gpu:
    enabled: false
    strategy: "ddp"
    gpus: [0, 1, 2, 3]
    find_unused_parameters: true
  
  # Early Stopping - Évite stop prématuré
  early_stopping:
    enabled: true
    patience: 15        # ↑ de 7 (laisse temps de converger)
    min_delta: 0.0001
    restore_best: true
  
  # LR Scheduler - Réduction adaptative
  lr_scheduler:
    enabled: true
    mode: "min"
    factor: 0.5
    patience: 10        # ↑ de 3 (ne pas réduire trop tôt)
    min_lr: 1.0e-7
  
  # Physical Loss (optionnel)
  physical_loss:
    use_predicted_output: false
    physical_sample_interval: 10
    physical_num_steps: 15
  
  # torch.compile - Optimisation performance
  compile:
    enabled: true
    rcn_mode: "reduce-overhead"
    diffusion_mode: "max-autotune"
    encoder_mode: "reduce-overhead"
    fallback_on_error: true  # Retour automatique à eager si erreur

# ============================================================================
# CONFIGURATION CHECKPOINT
# ============================================================================
checkpoint:
  enabled: true
  save_dir: "models"
  save_every: 5
  save_best: true
  max_checkpoints: 50

# ============================================================================
# CONFIGURATION ÉVALUATION
# ============================================================================
evaluation:
  enabled: true
  eval_every: 10
  num_samples: 10
  eval_num_steps: 12
  eval_scheduler: "dpm_solver++"
  crps_max_ensemble_members: 32
  compute_f1_extremes: true
  f1_percentiles: [95.0, 99.0]
  save_visualizations: true
  output_dir: "results"
  
  # Seuils de validation
  thresholds:
    MSE_MAX: 0.15
    MAE_MAX: 0.20
    CORR_MIN: 0.91
