# ============================================================================
# ST-CDGM - Configuration d'Entraînement Optimisée (v2.0)
# Basé sur l'analyse multi-rôles (ML Engineer, Climatologue, Mathématicien)
# ============================================================================

defaults:
  - _self_

# ============================================================================
# CONFIGURATION DES DONNÉES
# ============================================================================
data:
  dataset_format: "netcdf"  # "netcdf", "zarr", ou "shard"
  lr_path: "data/raw/train/predictor_ACCESS-CM2_hist.nc"
  hr_path: "data/raw/train/pr_ACCESS-CM2_hist.nc"
  static_path: "data/raw/static_predictors/ERA5_eval_ccam_12km.198110_NZ_Invariant.nc"
  zarr_dir: "data/raw/train/zarr"
  shard_dir: "data/raw/train/shards"
  
  # Séquences temporelles
  seq_len: 16              # Contexte temporel suffisant pour météo
  stride: 2               # Équilibre entre données et mémoire
  
  # Baseline
  baseline_strategy: "hr_smoothing"
  baseline_factor: 4
  
  # Préprocessing
  normalize: true
  # NetCDF memory guard: keep datasets lazy to avoid large RAM peaks
  # during pipeline construction (baseline/residual preparation).
  eager_load_datasets: false
  target_transform: "log1p"
  nan_fill_strategy: "mean"
  precipitation_delta: 0.01
  
  # Variables
  lr_variables: ['u_850', 'u_500', 'u_250', 'v_850', 'v_500', 'v_250', 
                 'w_850', 'w_500', 'w_250', 'q_850', 'q_500', 'q_250', 
                 't_850', 't_500', 't_250']
  hr_variables: ["pr"]
  static_variables: ["orog", "he", "vegt"]

# ============================================================================
# CONFIGURATION DU GRAPHE
# ============================================================================
graph:
  lr_shape: [23, 26]
  hr_shape: [172, 179]
  static_variables: []
  include_mid_layer: true  # GP500/GP250 activés

# ============================================================================
# CONFIGURATION DE L'ENCODEUR
# ============================================================================
encoder:
  hidden_dim: 128
  conditioning_dim: 128
  # Sprint 1 / B2 fix: fail loudly if a metapath is silently filtered out
  # because its node types are missing from the graph. Set to true only if
  # you intentionally want to downscale with an incomplete DAG (q < 5).
  allow_missing_metapaths: false
  # Sprint 2: use CausalConditioningProjector, which appends a learnable
  # DAG-token to the spatial cross-attention tokens so the UNet literally
  # *sees* A_dag. Required to make the DAG effectively condition every
  # diffusion sample (and to unlock interventional do-calculus at inference).
  causal_conditioning: true
  num_dag_tokens: 2
  metapaths:
    - name: "GP850_spat_adj"
      src: "GP850"
      relation: "spat_adj"
      target: "GP850"
      pool: "mean"
    - name: "GP850_to_GP500"
      src: "GP850"
      relation: "vert_adj"
      target: "GP500"
      pool: "mean"
    - name: "GP500_spat_adj"
      src: "GP500"
      relation: "spat_adj"
      target: "GP500"
      pool: "mean"
    - name: "GP500_to_GP250"
      src: "GP500"
      relation: "vert_adj"
      target: "GP250"
      pool: "mean"
    - name: "GP250_spat_adj"
      src: "GP250"
      relation: "spat_adj"
      target: "GP250"
      pool: "mean"

# ============================================================================
# CONFIGURATION RCN (Réseau Causal Récurrent)
# ============================================================================
rcn:
  hidden_dim: 128
  driver_dim: 15      # Overridden at runtime by data sample shape
  reconstruction_dim: 15
  dropout: 0.1        # Sprint 1: lower dropout — model is under-fitting, not overfitting
  detach_interval: 16  # Truncated BPTT: gradient flows back 16 steps
  # Sprint 1: initialise A_dag from the user-supplied prior matrix
  # (see loss.dag_prior) plus small noise. Avoids the xavier random init
  # that wanders until DAGMA drags it to zero, and gives the RCN a
  # physically meaningful starting topology (vertical coupling).
  init_dag_from_prior: true
  init_dag_prior_noise: 0.02
  # Sprint 2: grad gate on A_dag. Controls how much of the diffusion
  # gradient reaches A_dag via the straight-through interpolation inside
  # RCNCell.forward(). Default recipe:
  #   - 5 "cold" epochs with gate=0 (Sprint 1 detached behaviour)
  #   - linear ramp over 20 epochs to ``max`` (default 1.0 = full gradient)
  # The spectral projection after each optimiser step keeps A_dag acyclic
  # regardless of the gate value, so it's safe to go all the way to 1.0.
  dag_grad_gate:
    enabled: true
    # Sprint 4: shortened cold phase (5 → 2) so the diffusion gradient
    # reaches A_dag earlier. The combined recipe of wider cross-attention
    # (see diffusion.unet_kwargs) + contrastive DAG loss (see
    # loss.contrastive_dag.*) means A_dag is now a *useful* target for the
    # diffusion loss from epoch 3 onward — no benefit in keeping gate=0.
    cold_epochs: 2
    ramp_epochs: 15
    max: 1.0

# ============================================================================
# CONFIGURATION DIFFUSION
# ============================================================================
diffusion:
  in_channels: 1
  conditioning_dim: 128
  height: 172
  width: 179
  
  # Steps de diffusion - CRITIQUE pour la qualité
  steps: 12                # ↑ de 20 à 100 (qualité génération)
  scheduler_type: "dpm_solver++"        # Stable pour entraînement
  eval_num_steps: 12            # 15 steps suffisent avec DPM-Solver++
  
  use_gradient_checkpointing: false
  # Sprint 3: classifier-free guidance. The DPM-Solver++ path was silently
  # ignoring ``cfg_scale`` until we added dual-stream guidance support in
  # ``_sample_dpm_solver``. 1.5–2.0 is the sweet spot for residual
  # precipitation: below 1.2 the extrapolation has no effect, above 2.5
  # extremes become too salty. ``conditioning_dropout_prob: 0.1`` keeps
  # the training-time null branch available for CFG to extrapolate from.
  cfg_scale: 1.5
  conditioning_dropout_prob: 0.1
  conv_padding_mode: "zeros"
  anti_checkerboard: true
  
  unet_kwargs:
    layers_per_block: 1
    block_out_channels: [32, 64]
    # Sprint 4 / DAG-conditioning fix.
    # Previous config had cross-attention only on the 2nd down + 1st up block
    # and a plain ``UNetMidBlock2D``. That left the bottleneck (the most
    # semantically concentrated representation) blind to H_T and the A_dag
    # tokens. Combined with conditioning_dropout=0.1 + cfg_scale=0 at
    # inference, the UNet learned to marginalise out the conditioning
    # stream entirely. Empirical confirmation: intervention test on the
    # epoch-10 checkpoint shows delta_zero / signal ≈ 0.0001%.
    #
    # We now cross-attend at *every* resolution level (including mid),
    # keeping self-attention on (``only_cross_attention=[false, false]``)
    # so each block still has the usual self-attention channel. Cost on
    # CPU is modest because in_channels=1 and the deepest level runs at
    # ~44×45 tokens.
    down_block_types:
      - "CrossAttnDownBlock2D"
      - "CrossAttnDownBlock2D"
    up_block_types:
      - "CrossAttnUpBlock2D"
      - "CrossAttnUpBlock2D"
    mid_block_type: "UNetMidBlock2DCrossAttn"
    norm_num_groups: 8
    class_embed_type: "projection"

    # ⚠️ CRITIQUE: Doit correspondre à hidden_dim × nb_metapaths
    projection_class_embeddings_input_dim: 640  # 128 × 5 = 640

    resnet_time_scale_shift: "scale_shift"
    attention_head_dim: 32
    only_cross_attention: [false, false]

# ============================================================================
# CONFIGURATION DES PERTES (LOSS)
# ============================================================================
loss:
  # Pondérations des pertes - Sprint 1: rebalance after B1 fix.
  # With L_rec actually working now (B1), beta_rec has to be raised so the
  # DAG is driven by reconstruction. gamma_dag is slightly lowered so the
  # DAGMA penalty does not fight the new L_rec signal.
  lambda_gen: 1.0
  beta_rec: 0.20        # was 0.05 — L_rec is now functional (B1 fix)
  gamma_dag: 0.10       # was 0.15 — leave headroom for L_rec gradient
  lambda_phy: 0.0       # Disabled for 1-channel precip (div/vort need vector field)
  lambda_spectral: 0.0

  # Sprint 3: precipitation-specific physical loss.
  # Applies positivity + global mass + quantile matching on the composite
  # (baseline + predicted residual). Differentiable through the UNet via
  # x0-from-epsilon, so the gradient actually reaches the SCM. Triggers
  # every ``training.physical_loss.physical_sample_interval`` batches.
  # Weights = (positivity, mass, quantile). Default 1.0/0.1/0.2 — quantile
  # weight is the key lever for F1_p95/F1_p99.
  lambda_precip_phy: 0.05
  precip_phy_weights: [1.0, 0.1, 0.2]
  
  # Métriques spectrales
  use_spectral_loss: false
  log_spectral_metric_each_epoch: true
  
  # Contrainte DAG
  dag_method: "dagma"
  dagma_s: 1.0
  dag_l1_regularization: true
  dag_l1_weight: 0.01
  lambda_dag_prior: 0.005
  dag_prior:
    - [0.0, 0.2, 0.0, 0.0, 0.0]
    - [0.2, 0.0, 0.2, 0.0, 0.0]
    - [0.0, 0.2, 0.0, 0.2, 0.0]
    - [0.0, 0.0, 0.2, 0.0, 0.2]
    - [0.0, 0.0, 0.0, 0.2, 0.0]
  
  # Focal Loss - CRITIQUE pour événements extrêmes
  use_focal_loss: true
  focal_alpha: 1.0
  focal_gamma: 1.5        # ↑ de 2.0 (plus focus sur pixels difficiles)
  
  # Pondération événements extrêmes
  extreme_weight_factor: 2.0
  extreme_percentiles: [95.0, 99.0]
  
  # Type de perte reconstruction
  reconstruction_loss_type: "huber+cosine"  # Combinaison MSE + similarité cosinus

  # Sprint 2: optional HR-target identifiability head. Predicts summary
  # statistics of the HR field (spatial mean, std, p95, p99) from the
  # pooled causal state. Gradient flows back through the encoder + RCN,
  # pulling A_dag toward representations that know about precipitation
  # extremes. Use this *in addition to* the regular LR driver L_rec.
  hr_ident:
    enabled: true
    beta: 0.05
    stats: ["mean", "std", "p95", "p99"]

  # Sprint 4: contrastive DAG-conditioning loss.
  # For every K-th optimizer step we perform an *extra* UNet forward with
  # A_dag zeroed (same noisy target, same timestep, same class_labels,
  # only the DAG-token branch of conditioning_spatial is nulled). A margin
  # loss then forces the real-A_dag epsilon prediction to beat the zeroed
  # one by at least ``margin`` MSE points on the diffusion target:
  #     L_c = max(0, margin - (MSE(eps_zero, eps) - MSE(eps_real, eps)))
  # Gradient flows only through the *real* branch (eps_zero is produced
  # with ``torch.no_grad()``), so the UNet has an unambiguous incentive
  # to route A_dag information into its prediction. This is the single
  # most important lever that makes the DAG *actually* condition the
  # diffusion rather than being decorative.
  contrastive_dag:
    enabled: true
    weight: 0.5
    margin: 0.02
    # One contrastive pass every N optimizer steps. 4 is a good balance
    # on CPU (~25% training-time overhead). Raise to 1 for faster signal,
    # lower it to 8/16 if training throughput is the bottleneck.
    interval: 4

# ============================================================================
# CONFIGURATION ENTRAÎNEMENT
# ============================================================================
training:
  device: "cpu"  # "cuda" si GPU disponible
  epochs: 30    # ↑ de 10 à 100 (convergence complète)
  batch_size: 48
  num_workers: 0  # 0 pour CyVerse/Docker (évite /dev/shm limité)
  lr: 0.0003
  gradient_clipping: 0.5
  log_every: 20
  use_amp: false
  
  # Multi-GPU (DDP)
  multi_gpu:
    enabled: false
    strategy: "ddp"
    gpus: [0, 1, 2, 3]
    find_unused_parameters: true
  
  # Early Stopping - Évite stop prématuré
  early_stopping:
    enabled: true
    patience: 15        # ↑ de 7 (laisse temps de converger)
    min_delta: 0.0001
    restore_best: true
  
  # LR Scheduler - Réduction adaptative
  lr_scheduler:
    enabled: true
    mode: "min"
    factor: 0.5
    patience: 10        # ↑ de 3 (ne pas réduire trop tôt)
    min_lr: 1.0e-7
  
  # Physical Loss (optionnel)
  physical_loss:
    use_predicted_output: false
    physical_sample_interval: 10
    physical_num_steps: 15
  
  # torch.compile - Optimisation performance
  compile:
    enabled: true
    rcn_mode: "reduce-overhead"
    diffusion_mode: "max-autotune"
    encoder_mode: "reduce-overhead"
    fallback_on_error: true  # Retour automatique à eager si erreur

# ============================================================================
# CONFIGURATION CHECKPOINT
# ============================================================================
checkpoint:
  enabled: true
  save_dir: "models"
  save_every: 5
  save_best: true
  max_checkpoints: 50

# ============================================================================
# CONFIGURATION ÉVALUATION
# ============================================================================
evaluation:
  enabled: true
  eval_every: 10
  # Sprint 3: probabilistic-calibration bumps.
  # - num_samples 10→16: tighter CRPS estimate (≈ sqrt(10/16) ≈ 0.79x the
  #   Monte-Carlo noise), and sigma_r becomes statistically meaningful.
  # - eval_num_steps 12→25: DPM-Solver++ extrapolation error drops
  #   sharply between 12 and 25 steps on small residual UNets. Doubles
  #   inference cost (~14s → ~28s per sample on CPU) but recovers most
  #   of the RAPSD distance gap.
  num_samples: 16
  eval_num_steps: 25
  eval_scheduler: "dpm_solver++"
  crps_max_ensemble_members: 32
  compute_f1_extremes: true
  f1_percentiles: [95.0, 99.0]
  save_visualizations: true
  output_dir: "results"
  
  # Seuils de validation
  thresholds:
    MSE_MAX: 0.15
    MAE_MAX: 0.20
    CORR_MIN: 0.91
